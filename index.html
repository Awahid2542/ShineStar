<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShineStar | Star Graphics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #010409; color: white; font-family: sans-serif; }
        .admin-panel { display: none; }
        #finalCanvas { border: 5px solid white; display: block; margin: 0 auto; max-width: 100%; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
        <h1 onclick="toggleAdmin()" class="text-xl font-bold text-yellow-500">STAR GRAPHICS PRO</h1>
        <div id="token" class="text-xs bg-gray-800 px-3 py-1 rounded">Token: #---</div>
    </header>

    <div id="u-box" class="border-2 border-dashed border-gray-600 p-10 text-center rounded-xl cursor-pointer" onclick="document.getElementById('file').click()">
        <input type="file" id="file" class="hidden" accept="image/*">
        <p>📸 Click to Upload</p>
    </div>

    <div id="e-box" class="hidden space-y-4">
        <img id="crop-target" class="max-w-full">
        <button onclick="saveCrop()" class="w-full bg-yellow-500 text-black py-4 font-bold rounded-xl">SAVE & CONTINUE</button>
    </div>

    <div id="f-box" class="hidden space-y-6">
        <canvas id="finalCanvas"></canvas>
        
        <div id="admin-tools" class="admin-panel space-y-4 bg-gray-900 p-4 rounded-xl border border-yellow-600">
            <p class="text-yellow-500 font-bold text-xs uppercase text-center underline">Admin Master Controls</p>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="removeBgAndColor('#0047AB')" class="bg-blue-600 p-2 rounded text-[10px]">AUTO BLUE BG</button>
                <button onclick="removeBgAndColor('#FFFFFF')" class="bg-white text-black p-2 rounded text-[10px] font-bold">AUTO WHITE BG</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="downloadSheet('4x6')" class="bg-gray-700 p-3 rounded text-[10px]">DOWNLOAD 8 PICS (4x6)</button>
                <button onclick="downloadSheet('a4')" class="bg-gray-700 p-3 rounded text-[10px]">DOWNLOAD 25 PICS (A4)</button>
            </div>
        </div>

        <button onclick="whatsapp()" class="w-full bg-green-600 py-4 rounded-xl font-bold">SEND TO WHATSAPP</button>
    </div>

    <script>
        let cropper;
        const cv = document.getElementById('finalCanvas');
        const ctx = cv.getContext('2d');
        const API_KEY = "eiqj8NTavEWAENUCnWGx5LWc"; // <-- Yahan apni API Key dalein

        document.getElementById('file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('crop-target').src = ev.target.result;
                document.getElementById('u-box').classList.add('hidden');
                document.getElementById('e-box').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('crop-target'), { aspectRatio: 3.5/4.5 });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function saveCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 600, height: 800 });
            cv.width = 600; cv.height = 800;
            ctx.drawImage(canvas, 0, 0);
            document.getElementById('e-box').classList.add('hidden');
            document.getElementById('f-box').classList.remove('hidden');
        }

        async function removeBgAndColor(color) {
            if(API_KEY === "YAHAN_APNI_API_KEY_DALEIN") return alert("Pehle API Key dalein code mein!");
            
            alert("AI Background Saaf Kar Raha Hai... Sabar Karein.");
            const blob = await new Promise(res => cv.toBlob(res, 'image/png'));
            const formData = new FormData();
            formData.append('image_file', blob);
            formData.append('size', 'auto');
            formData.append('bg_color', color);

            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: formData
            });

            if (response.ok) {
                const resultBlob = await response.blob();
                const url = URL.createObjectURL(resultBlob);
                const img = new Image();
                img.onload = () => { ctx.clearRect(0,0,600,800); ctx.drawImage(img, 0,0,600,800); };
                img.src = url;
            } else {
                alert("API Error! Shayad Credits khatam ho gaye hain.");
            }
        }

        function downloadSheet(type) {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF(type === 'a4' ? 'p' : 'l', 'mm', type);
            const img = cv.toDataURL('image/jpeg', 1.0);
            let w = 35, h = 45, x = 10, y = 10, gap = 5;
            let count = (type === '4x6') ? 8 : 25;
            let maxX = (type === 'a4') ? 180 : 130;

            for(let i=0; i<count; i++) {
                pdf.addImage(img, 'JPEG', x, y, w, h);
                x += w + gap;
                if(x > maxX) { x = 10; y += h + gap; }
            }
            pdf.save(`StarPrint_${type}.pdf`);
        }

        function toggleAdmin() {
            let p = prompt("Password:");
            if(p === "star") document.getElementById('admin-tools').style.display = 'block';
        }

        function whatsapp() {
            window.location.href = `https://wa.me/923300254200?text=Order Ready!`;
        }
    </script>
</body>
</html>
