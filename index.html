<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShineStar | Star Graphics Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; touch-action: manipulation; }
        .star-card { background: rgba(30, 41, 59, 0.9); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-only { display: none; } /* Hidden from customers */
        .blue-bg { background-color: #0047ab !important; }
        .white-bg { background-color: #ffffff !important; }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#0f172a] z-50">
        <div onclick="toggleAdmin()"> <h1 class="text-xl font-bold text-yellow-500">SHINE STAR</h1>
            <p class="text-[10px] text-gray-400">Star Communication & Graphics</p>
        </div>
        <div id="live-token" class="bg-yellow-500 text-black px-4 py-1 rounded-full font-black shadow-lg italic">
            TOKEN: #---
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div id="upload-area" class="star-card p-10 text-center border-2 border-dashed border-yellow-500/20" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="text-5xl mb-4">📸</div>
            <h2 class="text-lg font-bold">APNI PHOTO SELECT KAREIN</h2>
            <p class="text-xs text-gray-400">Passport Size ke liye photo select karein</p>
        </div>

        <div id="editor-ui" class="hidden space-y-4">
            <div class="star-card p-2">
                <div id="canvas-wrapper" class="rounded-lg overflow-hidden">
                    <img id="image" class="max-w-full">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="applyBg('#0047ab')" class="bg-blue-800 p-3 rounded-xl text-xs font-bold border border-white/20">BLUE BACKGROUND</button>
                <button onclick="applyBg('#ffffff')" class="bg-white p-3 rounded-xl text-xs font-bold text-black">WHITE BACKGROUND</button>
            </div>

            <div id="admin-tools" class="admin-only star-card p-4 border-yellow-500 border">
                <p class="text-yellow-500 font-bold text-xs mb-3">ADMIN PRINT CONTROLS</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="makeGrid(8)" class="bg-gray-700 p-2 rounded text-[10px]">8 Photos</button>
                    <button onclick="makeGrid(12)" class="bg-gray-700 p-2 rounded text-[10px]">12 Photos</button>
                    <button onclick="makeGrid(16)" class="bg-gray-700 p-2 rounded text-[10px]">16 Photos</button>
                </div>
            </div>

            <button id="finalBtn" onclick="finishProcess()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 p-4 rounded-2xl text-black font-black shadow-xl uppercase tracking-widest">
                TAIYAR HAI - SEND TO SHOP
            </button>
        </div>

        <div id="output-area" class="hidden star-card p-4 text-center">
            <p class="text-yellow-500 font-bold mb-2">IMAGE TAIYAR HAI!</p>
            <img id="output-img" class="w-full rounded-lg shadow-2xl mb-4">
            <p class="text-[10px] text-gray-400">1. Image par ungli daba kar "Save Image" karein.<br>2. Niche green button dabayein.</p>
            <button onclick="whatsappConnect()" class="mt-4 w-full bg-green-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                SEND TO WHATSAPP
            </button>
        </div>
    </div>

    <script>
        let cropper;
        let clickCount = 0;
        const shopNumber = "923300254200";

        // Generate Random Token
        const token = Math.floor(100 + Math.random() * 900);
        document.getElementById('live-token').innerText = `TOKEN: #${token}`;

        // Secret Admin Toggle (Click Shop Name 5 times)
        function toggleAdmin() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('admin-tools').style.display = 'block';
                alert("ADMIN MODE ON: Print Sheets Enabled");
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('image').src = event.target.result;
                document.getElementById('upload-area').classList.add('hidden');
                document.getElementById('editor-ui').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('image'), {
                    aspectRatio: 3.5 / 4.5,
                    viewMode: 1
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applyBg(color) {
            // Note: Canvas-based BG replacement would go here. 
            // For now, it alerts customer.
            alert("Background Applied. Final result will be seen after clicking Finish.");
        }

        function finishProcess() {
            const canvas = cropper.getCroppedCanvas({ width: 350, height: 450 });
            document.getElementById('output-img').src = canvas.toDataURL("image/jpeg");
            document.getElementById('editor-ui').classList.add('hidden');
            document.getElementById('output-area').classList.remove('hidden');
        }

        function whatsappConnect() {
            const msg = `Asalam-o-Alaikum! Star Communication, mera order ready hai. Token #${token}. Photo bhej raha hoon.`;
            window.location.href = `https://wa.me/${shopNumber}?text=${encodeURIComponent(msg)}`;
        }

        function makeGrid(num) {
            // Admin only: Logic to multiply the image into a grid for printing
            alert(`Generating sheet with ${num} photos for printing...`);
        }
    </script>
</body>
</html>
