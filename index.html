<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShineStar Ultimate | Star Graphics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(22, 27, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #facc15 0%, #eab308 100%); color: #000; font-weight: 800; }
        .admin-view { display: none; }
        #mainCanvas { display: none; }
        .preview-frame { border: 8px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: 0.3s; }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#0b0f1a] z-50">
        <div onclick="checkAdmin()">
            <h1 class="text-2xl font-black text-yellow-500 italic">SHINE STAR <span class="text-xs text-gray-500 not-italic tracking-widest block">ULTIMATE ENGINE</span></h1>
        </div>
        <div id="tokenLabel" class="bg-yellow-500 text-black px-4 py-1 rounded font-black text-xs uppercase shadow-lg">Token: #---</div>
    </header>

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div id="uploadBox" class="glass p-16 text-center border-2 border-dashed border-gray-700 cursor-pointer" onclick="document.getElementById('fileIn').click()">
            <input type="file" id="fileIn" class="hidden" accept="image/*">
            <p class="text-6xl mb-4">🖼️</p>
            <h2 class="text-xl font-bold">SELECT CUSTOMER PHOTO</h2>
            <p class="text-gray-500 text-sm mt-2 font-mono italic">Recommended: Plain Background Photo</p>
        </div>

        <div id="editorBox" class="hidden space-y-4">
            <div class="glass p-2 overflow-hidden">
                <img id="cropImg" class="max-w-full">
            </div>
            <button onclick="applyCrop()" class="w-full btn-gold py-5 rounded-2xl text-lg shadow-xl uppercase">Process & Clean Photo</button>
        </div>

        <div id="finalBox" class="hidden space-y-8 animate-in fade-in duration-500">
            <div class="flex justify-center flex-col items-center gap-4">
                <img id="displayImg" class="preview-frame max-w-[280px]">
                <button id="resetBtn" onclick="resetToOriginal()" class="text-xs bg-red-900/50 px-3 py-1 rounded text-red-200">Undo All Changes</button>
            </div>

            <div id="adminArea" class="admin-view space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div class="glass p-5 space-y-4">
                        <p class="text-yellow-500 font-bold text-xs uppercase tracking-widest">Studio Lighting & HD</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="adjust('brightness(1.1)')" class="bg-gray-800 p-3 rounded text-[10px] font-bold">+ Brightness</button>
                            <button onclick="adjust('contrast(1.2)')" class="bg-gray-800 p-3 rounded text-[10px] font-bold">+ Sharpness</button>
                            <button onclick="adjust('saturate(1.2)')" class="bg-gray-800 p-3 rounded text-[10px] font-bold">Skin Glow</button>
                            <button onclick="adjust('grayscale(1)')" class="bg-gray-800 p-3 rounded text-[10px] font-bold">B & W</button>
                        </div>
                    </div>

                    <div class="glass p-5 space-y-4">
                        <p class="text-yellow-500 font-bold text-xs uppercase tracking-widest">Background Removal</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="smartBg('#0047AB')" class="bg-blue-700 p-3 rounded text-[10px] font-bold">BLUE BG</button>
                            <button onclick="smartBg('#FFFFFF')" class="bg-white text-black p-3 rounded text-[10px] font-bold">WHITE BG</button>
                        </div>
                        <p class="text-[9px] text-gray-500 italic text-center">Note: Needs Plain Backdrop for best results</p>
                    </div>
                </div>

                <div class="glass p-6 text-center space-y-4">
                    <p class="text-yellow-500 font-bold text-xs uppercase tracking-widest">Professional Print Sheets (High Res)</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="makePDF('4x6', 8)" class="bg-gradient-to-r from-gray-700 to-gray-800 p-4 rounded-xl text-xs">8 PICS ON 4x6 PAPER</button>
                        <button onclick="makePDF('a4', 25)" class="bg-gradient-to-r from-gray-700 to-gray-800 p-4 rounded-xl text-xs">25 PICS ON A4 SHEET</button>
                    </div>
                </div>
            </div>

            <div id="customerActions" class="space-y-4">
                <button onclick="downloadImg()" class="w-full glass py-4 font-bold border-gray-600 border-2">Download To Gallery</button>
                <button onclick="whatsappSend()" class="w-full bg-green-600 py-4 rounded-2xl font-black shadow-xl">SEND TO WHATSAPP</button>
            </div>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>
    <canvas id="bufferCanvas"></canvas>

    <script>
        let cropper;
        const mainCv = document.getElementById('mainCanvas');
        const bufferCv = document.getElementById('bufferCanvas');
        const mCtx = mainCv.getContext('2d');
        const bCtx = bufferCv.getContext('2d');
        const token = Math.floor(100 + Math.random() * 899);
        document.getElementById('tokenLabel').innerText = `TOKEN: #${token}`;

        function checkAdmin() {
            let p = prompt("Admin Password:");
            if(p === "star") {
                document.querySelectorAll('.admin-view').forEach(el => el.style.display = 'block');
                document.getElementById('customerActions').classList.add('hidden');
                alert("Star Graphics Pro Admin Unlocked!");
            }
        }

        document.getElementById('fileIn').onchange = (e) => {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropImg').src = ev.target.result;
                document.getElementById('uploadBox').classList.add('hidden');
                document.getElementById('editorBox').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropImg'), { aspectRatio: 3.5/4.5, viewMode: 1 });
            };
            reader.readAsDataURL(f);
        };

        function applyCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 600, height: 800 });
            mainCv.width = 600; mainCv.height = 800;
            bufferCv.width = 600; bufferCv.height = 800;
            mCtx.drawImage(canvas, 0, 0);
            bCtx.drawImage(canvas, 0, 0); // Save original state to buffer for Undo
            refreshDisplay();
            document.getElementById('editorBox').classList.add('hidden');
            document.getElementById('finalBox').classList.remove('hidden');
        }

        function adjust(filterStr) {
            mCtx.filter = filterStr;
            mCtx.drawImage(mainCv, 0, 0);
            mCtx.filter = "none";
            refreshDisplay();
        }

        function resetToOriginal() {
            mCtx.clearRect(0,0,600,800);
            mCtx.drawImage(bufferCv, 0, 0);
            refreshDisplay();
        }

        function smartBg(color) {
            const temp = document.createElement('canvas');
            temp.width = 600; temp.height = 800;
            const tCtx = temp.getContext('2d');
            
            // Draw background first
            tCtx.fillStyle = color;
            tCtx.fillRect(0,0,600,800);
            
            // Overlay current image
            tCtx.drawImage(mainCv, 0, 0);
            
            mCtx.clearRect(0,0,600,800);
            mCtx.drawImage(temp, 0, 0);
            refreshDisplay();
        }

        function refreshDisplay() {
            document.getElementById('displayImg').src = mainCv.toDataURL("image/jpeg", 0.95);
        }

        function makePDF(size, count) {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF(size === 'a4' ? 'p' : 'l', 'mm', size);
            const img = mainCv.toDataURL('image/jpeg', 1.0);
            
            let w = 35; let h = 45; // mm
            let xStart = 10; let x = 10; let y = 10;
            let gap = 5;
            let maxX = (size === 'a4') ? 180 : 130;

            for(let i=0; i<count; i++) {
                pdf.addImage(img, 'JPEG', x, y, w, h);
                x += w + gap;
                if(x > maxX) { x = xStart; y += h + gap; }
            }
            pdf.save(`StarPrint_${token}_${size}.pdf`);
        }

        function whatsappSend() {
            window.location.href = `https://wa.me/923300254200?text=${encodeURIComponent('Token #' + token + ' Image Ready for Print.')}`;
        }

        function downloadImg() {
            const l = document.createElement('a');
            l.download = `Star_${token}.jpg`;
            l.href = mainCv.toDataURL("image/jpeg", 1.0);
            l.click();
        }
    </script>
</body>
</html>
