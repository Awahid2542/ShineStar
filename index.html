<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Graphics Ultra | AI Shop Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .admin-panel { display: none; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        canvas { display: none; }
        #preview { border: 4px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-6 glass p-4 rounded-2xl border-b border-yellow-500">
        <h1 onclick="askAdmin()" class="text-xl font-black text-yellow-500 italic">STAR GRAPHICS PRO</h1>
        <div id="tokenLabel" class="bg-yellow-500 text-black px-3 py-1 rounded font-bold text-xs">TOKEN: #---</div>
    </header>

    <div id="box-1" class="glass p-12 text-center rounded-3xl border-2 border-dashed border-gray-600 cursor-pointer" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <p class="text-5xl mb-4">📸</p>
        <p class="font-bold text-lg">Select Photo to Print</p>
    </div>

    <div id="box-2" class="hidden space-y-4">
        <div class="glass p-2 rounded-xl overflow-hidden">
            <img id="cropTarget" class="max-w-full">
        </div>
        <button onclick="applyCrop()" class="w-full bg-yellow-500 text-black py-4 font-black rounded-2xl uppercase shadow-lg">Next: Edit & Layout</button>
    </div>

    <div id="box-3" class="hidden space-y-6">
        <div class="flex justify-center flex-col items-center gap-3">
            <img id="preview" class="rounded-lg">
            <button onclick="reset()" class="text-[10px] text-red-400 underline">Reset All Changes</button>
        </div>

        <div id="adminControls" class="admin-panel space-y-4 animate-pulse-slow">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-4 rounded-xl space-y-3">
                    <p class="text-[10px] text-yellow-500 font-bold uppercase">Lighting & HD</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="filter('brightness(1.1)')" class="bg-gray-800 p-2 rounded text-[10px] font-bold">BRIGHTNESS+</button>
                        <button onclick="filter('contrast(1.2)')" class="bg-gray-800 p-2 rounded text-[10px] font-bold">SHARP HD</button>
                    </div>
                </div>

                <div class="glass p-4 rounded-xl space-y-3">
                    <p class="text-[10px] text-blue-400 font-bold uppercase">AI Background (Requires API)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="aiRemoveBg('#0047AB')" class="bg-blue-700 p-2 rounded text-[10px] font-bold italic">AI BLUE BG</button>
                        <button onclick="aiRemoveBg('#FFFFFF')" class="bg-white text-black p-2 rounded text-[10px] font-bold italic">AI WHITE BG</button>
                    </div>
                </div>
            </div>

            <div class="glass p-4 rounded-xl space-y-3">
                <p class="text-[10px] text-green-500 font-bold uppercase text-center">Print Layouts</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="downloadPDF('4x6', 8)" class="bg-gray-700 p-3 rounded text-[10px] font-bold italic">DOWNLOAD 8 PICS (4x6)</button>
                    <button onclick="downloadPDF('a4', 25)" class="bg-gray-700 p-3 rounded text-[10px] font-bold italic">DOWNLOAD 25 PICS (A4)</button>
                </div>
            </div>
        </div>

        <button onclick="whatsapp()" class="w-full bg-green-600 py-4 rounded-2xl font-black shadow-xl uppercase tracking-widest">Send to WhatsApp</button>
    </div>

    <canvas id="mc"></canvas>
    <canvas id="bc"></canvas>

    <script>
        let cropper;
        const mainCv = document.getElementById('mc');
        const buffCv = document.getElementById('bc');
        const mCtx = mainCv.getContext('2d');
        const bCtx = buffCv.getContext('2d');
        const API_KEY = "eiqj8NTavEWAENUCnWGx5LWc"; // Yahan Key dalein
        
        const token = Math.floor(100 + Math.random() * 899);
        document.getElementById('tokenLabel').innerText = `TOKEN: #${token}`;

        function askAdmin() {
            if(prompt("Admin Password:") === "star") {
                document.getElementById('adminControls').style.display = 'block';
                alert("Admin Mode Active!");
            }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropTarget').src = ev.target.result;
                document.getElementById('box-1').classList.add('hidden');
                document.getElementById('box-2').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropTarget'), { aspectRatio: 3.5/4.5 });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applyCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 600, height: 800 });
            mainCv.width = 600; mainCv.height = 800;
            buffCv.width = 600; buffCv.height = 800;
            mCtx.drawImage(canvas, 0, 0);
            bCtx.drawImage(canvas, 0, 0);
            update();
            document.getElementById('box-2').classList.add('hidden');
            document.getElementById('box-3').classList.remove('hidden');
        }

        function filter(f) {
            mCtx.filter = f;
            mCtx.drawImage(mainCv, 0, 0);
            mCtx.filter = "none";
            update();
        }

        function reset() {
            mCtx.clearRect(0,0,600,800);
            mCtx.drawImage(buffCv, 0, 0);
            update();
        }

        async function aiRemoveBg(color) {
            if(API_KEY.includes("PASTE")) return alert("Please add Remove.bg API Key in code first!");
            alert("AI is working... Please wait.");
            
            const blob = await new Promise(res => mainCv.toBlob(res, 'image/png'));
            const fd = new FormData();
            fd.append('image_file', blob);
            fd.append('bg_color', color);

            const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: fd
            });

            if(res.ok) {
                const b = await res.blob();
                const img = new Image();
                img.onload = () => { mCtx.clearRect(0,0,600,800); mCtx.drawImage(img, 0,0,600,800); update(); };
                img.src = URL.createObjectURL(b);
            } else { alert("API Error or No Credits!"); }
        }

        function update() {
            document.getElementById('preview').src = mainCv.toDataURL("image/jpeg", 0.95);
        }

        function downloadPDF(size, count) {
            const { jsPDF } = window.jspdf;
            const orientation = (size === 'a4') ? 'p' : 'l';
            const pdf = new jsPDF(orientation, 'mm', size);
            
            const imgData = mainCv.toDataURL('image/jpeg', 1.0);
            
            let w = 35, h = 45, x = 10, y = 10, gap = 5;
            let maxX = (size === 'a4') ? 180 : 130;

            for(let i=0; i<count; i++) {
                pdf.addImage(imgData, 'JPEG', x, y, w, h);
                x += w + gap;
                if(x > maxX) { x = 10; y += h + gap; }
            }
            pdf.save(`StarPrint_${token}_${size}.pdf`);
            alert(size.toUpperCase() + " PDF Downloaded!");
        }

        function whatsapp() {
            window.location.href = `https://wa.me/923300254200?text=Token #${token} Order Ready.`;
        }
    </script>
</body>
</html>
