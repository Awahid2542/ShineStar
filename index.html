<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Graphics Pro | AI Photo Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Inter', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .btn-star { background: #238636; color: white; font-weight: 600; border-radius: 8px; transition: 0.2s; }
        .btn-star:hover { background: #2ea043; }
        #adminPanel { display: none; border-top: 2px solid #e3b341; padding-top: 20px; }
        canvas { display: none; }
        #previewImg { border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div onclick="showAdmin()">
                <h1 class="text-2xl font-bold text-yellow-500">STAR GRAPHICS</h1>
                <p class="text-xs text-gray-500">Advance Self-Service Portal</p>
            </div>
            <div class="card px-4 py-2 text-sm font-mono" id="tokenId">TOKEN: #---</div>
        </header>

        <div id="uploadBox" class="card p-16 text-center border-dashed border-2 border-gray-600 cursor-pointer" onclick="document.getElementById('imgInput').click()">
            <input type="file" id="imgInput" class="hidden" accept="image/*">
            <p class="text-4xl mb-4">📸</p>
            <p class="font-bold">Click to Upload Customer Photo</p>
        </div>

        <div id="editorBox" class="hidden space-y-6">
            <div class="card p-2 overflow-hidden">
                <img id="imageToEdit" class="max-w-full">
            </div>
            <button onclick="processPhoto()" class="w-full btn-star py-4 text-lg">STEP 1: CROP & CLEAN</button>
        </div>

        <div id="finalBox" class="hidden space-y-8">
            <div class="flex justify-center">
                <img id="previewImg" class="max-w-[250px]">
            </div>

            <div id="adminPanel" class="space-y-6">
                <h2 class="text-yellow-500 font-bold italic">ADMIN MASTER TOOLS (Secret)</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="card p-4 space-y-3">
                        <p class="text-xs font-bold text-gray-400">BG REMOVAL & COLOR</p>
                        <div class="flex gap-2">
                            <button onclick="changeBg('#0047AB')" class="flex-1 bg-blue-700 py-2 rounded text-xs">BLUE BG</button>
                            <button onclick="changeBg('#FFFFFF')" class="flex-1 bg-white text-black py-2 rounded text-xs font-bold">WHITE BG</button>
                        </div>
                        <button onclick="enhanceHD()" class="w-full bg-purple-600 py-2 rounded text-xs font-bold mt-2 italic">✨ AUTO HD ENHANCE</button>
                    </div>

                    <div class="card p-4 space-y-3">
                        <p class="text-xs font-bold text-gray-400">PRINT LAYOUTS</p>
                        <button onclick="printLayout('4x6', 8)" class="w-full bg-gray-700 py-2 rounded text-[10px]">8 PHOTOS (4x6 Paper)</button>
                        <button onclick="printLayout('a4', 24)" class="w-full bg-gray-700 py-2 rounded text-[10px]">FULL A4 SHEET (24 Photos)</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="downloadFinal()" class="card py-3 font-bold hover:bg-gray-800">Download for Mobile</button>
                <button onclick="sendWhatsApp()" class="bg-green-600 py-4 rounded-xl font-bold text-center">Send to Shop (WhatsApp)</button>
            </div>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        let cropper;
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const token = Math.floor(100 + Math.random() * 899);
        document.getElementById('tokenId').innerText = `TOKEN: #${token}`;

        function showAdmin() {
            let pass = prompt("Enter Admin Password (Hint: star)");
            if(pass === "star") {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        document.getElementById('imgInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('imageToEdit').src = ev.target.result;
                document.getElementById('uploadBox').classList.add('hidden');
                document.getElementById('editorBox').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToEdit'), {
                    aspectRatio: 3.5 / 4.5,
                    viewMode: 1
                });
            };
            reader.readAsDataURL(file);
        };

        function processPhoto() {
            const croppedCanvas = cropper.getCroppedCanvas({ width: 600, height: 800 });
            canvas.width = 600; canvas.height = 800;
            ctx.drawImage(croppedCanvas, 0, 0);
            updatePreview();
            document.getElementById('editorBox').classList.add('hidden');
            document.getElementById('finalBox').classList.remove('hidden');
        }

        function changeBg(color) {
            // Smart Canvas Logic for BG change
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 600; tempCanvas.height = 800;
            
            // Fill Background
            tCtx.fillStyle = color;
            tCtx.fillRect(0, 0, 600, 800);
            
            // Draw original image on top
            tCtx.drawImage(canvas, 0, 0);
            ctx.clearRect(0,0,600,800);
            ctx.drawImage(tempCanvas, 0, 0);
            updatePreview();
            alert("Background Color Applied!");
        }

        function enhanceHD() {
            ctx.filter = "contrast(1.1) brightness(1.05) saturate(1.2) contrast(1.1)";
            ctx.drawImage(canvas, 0, 0);
            ctx.filter = "none";
            updatePreview();
            alert("HD Enhancement Applied!");
        }

        function updatePreview() {
            document.getElementById('previewImg').src = canvas.toDataURL("image/jpeg", 0.9);
        }

        async function printLayout(size, count) {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF(size === 'a4' ? 'p' : 'l', 'mm', size);
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            
            let w = 35; let h = 45; // mm
            let x = 10; let y = 10;
            let gap = 5;

            for(let i=0; i<count; i++) {
                pdf.addImage(imgData, 'JPEG', x, y, w, h);
                x += w + gap;
                if(x > (size === 'a4' ? 180 : 130)) { x = 10; y += h + gap; }
            }
            pdf.save(`StarOrder_${token}_${size}.pdf`);
        }

        function sendWhatsApp() {
            const msg = `Asalam-o-Alaikum! Star Graphics, order Token #${token} ready hai. Photo bhej raha hoon.`;
            window.location.href = `https://wa.me/923300254200?text=${encodeURIComponent(msg)}`;
        }

        function downloadFinal() {
            const link = document.createElement('a');
            link.download = `StarPhoto_${token}.jpg`;
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        }
    </script>
</body>
</html>
        <div id="canvas-wrapper" class="rounded-lg overflow-hidden">
                    <img id="image" class="max-w-full">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="applyBg('#0047ab')" class="bg-blue-800 p-3 rounded-xl text-xs font-bold border border-white/20">BLUE BACKGROUND</button>
                <button onclick="applyBg('#ffffff')" class="bg-white p-3 rounded-xl text-xs font-bold text-black">WHITE BACKGROUND</button>
            </div>

            <div id="admin-tools" class="admin-only star-card p-4 border-yellow-500 border">
                <p class="text-yellow-500 font-bold text-xs mb-3">ADMIN PRINT CONTROLS</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="makeGrid(8)" class="bg-gray-700 p-2 rounded text-[10px]">8 Photos</button>
                    <button onclick="makeGrid(12)" class="bg-gray-700 p-2 rounded text-[10px]">12 Photos</button>
                    <button onclick="makeGrid(16)" class="bg-gray-700 p-2 rounded text-[10px]">16 Photos</button>
                </div>
            </div>

            <button id="finalBtn" onclick="finishProcess()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 p-4 rounded-2xl text-black font-black shadow-xl uppercase tracking-widest">
                TAIYAR HAI - SEND TO SHOP
            </button>
        </div>

        <div id="output-area" class="hidden star-card p-4 text-center">
            <p class="text-yellow-500 font-bold mb-2">IMAGE TAIYAR HAI!</p>
            <img id="output-img" class="w-full rounded-lg shadow-2xl mb-4">
            <p class="text-[10px] text-gray-400">1. Image par ungli daba kar "Save Image" karein.<br>2. Niche green button dabayein.</p>
            <button onclick="whatsappConnect()" class="mt-4 w-full bg-green-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                SEND TO WHATSAPP
            </button>
        </div>
    </div>

    <script>

        let clickCount = 0;
        const shopNumber = "923300254200";

        // Generate Random Token
        const token = Math.floor(100 + Math.random() * 900);
        document.getElementById('live-token').innerText = `TOKEN: #${token}`;

        // Secret Admin Toggle (Click Shop Name 5 times)
        function toggleAdmin() {

                document.getElementById('admin-tools').style.display = 'block';
                alert("ADMIN MODE ON: Print Sheets Enabled");

        }

            const reader = new FileReader();

                    viewMode: 1

        };

        function applyBg(color) {
            // Note: Canvas-based BG replacement would go here. 
            // For now, it alerts customer.
            alert("Background Applied. Final result will be seen after clicking Finish.");
        }

        function finishProcess() {
            const canvas = cropper.getCroppedCanvas({ width: 350, height: 450 });
            document.getElementById('output-img').src = canvas.toDataURL("image/jpeg");
            document.getElementById('editor-ui').classList.add('hidden');
            document.getElementById('output-area').classList.remove('hidden');
        }

        function whatsappConnect() {
            const msg = `Asalam-o-Alaikum! Star Communication, mera order ready hai. Token #${token}. Photo bhej raha hoon.`;
            window.location.href = `https://wa.me/${shopNumber}?text=${encodeURIComponent(msg)}`;
        }

        function makeGrid(num) {

            alert(`Generating sheet with ${num} photos for printing...`);
        }
    </script>
</body>
</html>
