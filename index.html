<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShineStar | Star Communication & Graphics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; overflow-x: hidden; }
        .star-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-shine { background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #000; font-weight: bold; transition: 0.3s; }
        #cropper-container { max-height: 400px; overflow: hidden; border-radius: 12px; }
    </style>
</head>
<body class="text-white pb-10">

    <header class="p-4 border-b border-gray-700 flex justify-between items-center sticky top-0 bg-[#0f172a] z-50">
        <div>
            <h1 class="text-xl font-bold text-yellow-500">SHINE STAR</h1>
            <p class="text-[10px] text-gray-400">Star Communication & Graphics</p>
        </div>
        <div id="token-box" class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-bold text-sm">
            Token: #001
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="upload-box" class="star-card p-8 rounded-2xl text-center border-2 border-dashed border-yellow-500/30">
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <div onclick="document.getElementById('fileInput').click()" class="space-y-3">
                <div class="text-4xl">📤</div>
                <h2 class="text-lg font-semibold">Upload Photos</h2>
                <p class="text-xs text-gray-400">Passport, CNIC, ya Documents select karein</p>
            </div>
        </div>

        <div id="editor-ui" class="hidden space-y-4">
            <div id="cropper-container" class="star-card">
                <img id="main-image">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="star-card p-3 rounded-xl">
                    <label class="text-[10px] uppercase text-gray-400">Background</label>
                    <div class="flex gap-2 mt-1">
                        <button onclick="setBg('#3b82f6')" class="w-6 h-6 bg-blue-600 rounded-full"></button>
                        <button onclick="setBg('#ffffff')" class="w-6 h-6 bg-white rounded-full"></button>
                        <button onclick="setBg('#ef4444')" class="w-6 h-6 bg-red-600 rounded-full"></button>
                    </div>
                </div>
                <div class="star-card p-3 rounded-xl">
                    <label class="text-[10px] uppercase text-gray-400">Layout</label>
                    <select id="size-type" class="w-full bg-transparent text-sm mt-1 outline-none">
                        <option value="a4">A4 Paper (8 Photos)</option>
                        <option value="4x6">4x6 Sheet</option>
                        <option value="single">Single Photo</option>
                    </select>
                </div>
            </div>

            <button onclick="generateAndSend()" class="w-full btn-shine p-4 rounded-xl shadow-lg">
                ✅ COMPLETE & SEND TO SHOP
            </button>
        </div>

        <div class="star-card p-4 rounded-xl text-center">
            <p class="text-xs text-gray-300 italic">"Ab line mein lagne ki zaroorat nahi, apna kaam khud set karein aur counter se print le lein."</p>
        </div>
    </div>

    <script>
        let cropper;
        const fileInput = document.getElementById('fileInput');
        const mainImage = document.getElementById('main-image');
        const editorUi = document.getElementById('editor-ui');
        const shopWhatsApp = "923300254200"; // Aapka Number

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    mainImage.src = ev.target.result;
                    editorUi.classList.remove('hidden');
                    document.getElementById('upload-box').classList.add('hidden');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(mainImage, {
                        aspectRatio: 3.5 / 4.5, // Passport Standard
                        viewMode: 1
                    });
                };
                reader.readAsDataURL(file);
            }
        };

        function setBg(color) {
            // Note: Background change logic requires AI or Canvas processing
            alert("Background color " + color + " select ho gaya hai.");
        }

        function generateAndSend() {
            // Token increment logic
            let token = Math.floor(Math.random() * 900) + 100;
            const msg = `Asalam-o-Alaikum Star Graphics! Mera Photo ready hai. Token No: #${token}. Kindly iska print nikal den.`;
            const waUrl = `https://wa.me/${shopWhatsApp}?text=${encodeURIComponent(msg)}`;
            
            alert("Perfect! Aapka document print ke liye ready hai.");
            window.location.href = waUrl;
        }

        // Auto Token update
        window.onload = () => {
            let t = localStorage.getItem('lastT') || 1;
            document.getElementById('token-box').innerText = `Token: #${String(t).padStart(3, '0')}`;
            localStorage.setItem('lastT', parseInt(t) + 1);
        };
    </script>
</body>
</html>
